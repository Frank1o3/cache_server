target-version = "py314"
line-length = 100

cache-dir = ".cache/ruff"

[lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4", "RET", "RUF"]

ignore = ["E501"]

[lint.mccabe]
max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
line-ending = "lf"
